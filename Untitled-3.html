<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b');
            background-size: cover;
            background-position: center;
            color: white;
            min-height: 100vh;
        }

        .navbar {
            margin-top: 20px;
            border-radius: 10px;
            backdrop-filter: blur(8px);
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 15px;
        }

        h2 {
            margin-top: 30px;
            font-weight: bold;
        }

        .nav-link:hover {
            color: #00ffcc !important;
        }
    </style>
</head>

<body class="container mt-3">

<nav class="navbar navbar-dark bg-dark p-3 justify-content-center">
    <a class="nav-link text-white mx-3" href="index.html">Home</a>
    <a class="nav-link text-white mx-3" href="courses.html">Courses</a>
    <a class="nav-link text-white mx-3" href="feedback.html">Feedback</a>
</nav>

<h2 id="welcome"></h2>

<div class="card p-4 mt-4">
    <button class="btn btn-success" onclick="showTime()">Show Date & Time</button>
    <p id="time" class="mt-3"></p>
</div>

<script>
let name = localStorage.getItem("studentName");
document.getElementById("welcome").innerText = "Welcome " + name;

function showTime() {
    document.getElementById("time").innerText = new Date();
}
</script>

</body>
</html>
