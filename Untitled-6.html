<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b');
            background-size: cover;
            background-position: center;
            color: white;
            min-height: 100vh;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .page {
            display: none;
        }

        .glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            max-width: 500px;
            margin: auto;
        }

        .navbar a {
            cursor: pointer;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #00ffcc !important;
            transform: scale(1.1);
        }

        input, select, textarea {
            background: rgba(255,255,255,0.2) !important;
            border: none !important;
            color: white !important;
        }

        input::placeholder, textarea::placeholder {
            color: #ddd;
        }

        button {
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>🎓 Student Portal</h1>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark justify-content-center py-3">
    <a class="nav-link text-white mx-3 px-3" onclick="showPage('home')">Home</a>
    <a class="nav-link text-white mx-3 px-3" onclick="showPage('registration')">Registration</a>
    <a class="nav-link text-white mx-3 px-3" onclick="showPage('dashboard')">Dashboard</a>
    <a class="nav-link text-white mx-3 px-3" onclick="showPage('courses')">Courses</a>
    <a class="nav-link text-white mx-3 px-3" onclick="showPage('feedback')">Feedback</a>
</nav>
<br>

<!-- HOME -->
<div id="home" class="page glass">
    <h2>Welcome</h2>
    <p class="text-center">Your Smart Student Management Portal 🚀</p>
</div>

<!-- REGISTRATION -->
<div id="registration" class="page glass">
    <h2>Registration</h2>

    <input id="name" placeholder="Name" class="form-control mb-2">
    <input id="email" placeholder="Email" class="form-control mb-2">
    <input id="password" type="password" placeholder="Password" class="form-control mb-2">
    <input id="confirm" type="password" placeholder="Confirm Password" class="form-control mb-2">
    <input id="age" placeholder="Age" class="form-control mb-2">

    <select id="gender" class="form-control mb-2">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <button class="btn btn-primary" onclick="validateForm()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page glass">
    <h2 id="welcome"></h2>

    <button class="btn btn-success mb-2" onclick="showTime()">Show Date & Time</button>
    <p id="time" class="text-center"></p>
</div>

<!-- COURSES -->
<div id="courses" class="page glass">
    <h2>Select Courses</h2>

    <input type="checkbox" value="Web Development"> Web Development<br>
    <input type="checkbox" value="AI"> Artificial Intelligence<br>
    <input type="checkbox" value="Database Systems"> Database Systems<br>
    <input type="checkbox" value="Mobile App Development"> Mobile App Development<br><br>

    <button class="btn btn-warning" onclick="showCourses()">Submit</button>
</div>

<!-- FEEDBACK -->
<div id="feedback" class="page glass">
    <h2>Feedback</h2>

    <input id="fname" placeholder="Name" class="form-control mb-2">
    <textarea id="comments" placeholder="Comments" class="form-control mb-2"></textarea>

    <select id="rating" class="form-control mb-2">
        <option value="">Rating</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
    </select>

    <button class="btn btn-danger" onclick="submitFeedback()">Submit</button>
</div>

<script>

// PAGE SWITCH
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(page).style.display = 'block';
}

// DEFAULT
showPage('home');

// VALIDATION
function validateForm() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let age = document.getElementById("age").value;

    if (!name || !email || !pass || !confirm || !age) {
        alert("All fields required");
        return;
    }

    if (!email.includes("@")) {
        alert("Invalid Email");
        return;
    }

    if (pass !== confirm) {
        alert("Passwords do not match");
        return;
    }

    if (isNaN(age)) {
        alert("Age must be number");
        return;
    }

    localStorage.setItem("studentName", name);
    document.getElementById("welcome").innerText = "Welcome " + name;

    showPage('dashboard');
}

// TIME
function showTime() {
    document.getElementById("time").innerText = new Date();
}

// COURSES
function showCourses() {
    let selected = [];
    let checkboxes = document.querySelectorAll("#courses input:checked");

    checkboxes.forEach(cb => selected.push(cb.value));

    alert("Selected: " + selected.join(", "));
}

// FEEDBACK
function submitFeedback() {
    let name = document.getElementById("fname").value;
    let comments = document.getElementById("comments").value;

    if (!name || !comments) {
        alert("All fields required");
        return;
    }

    alert("Feedback Submitted Successfully!");
}

</script>

</body>
</html>
