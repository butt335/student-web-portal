<!DOCTYPE html>
<html>
<head>
<title>Courses</title>

<style>
body {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b');
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 50px;
    min-height: 100vh;
}

/* Glass effect box feel */
.container-box {
    display: inline-block;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container-box">

<h2>Select Courses</h2>

<input type="checkbox" value="Web Development"> Web Development<br>
<input type="checkbox" value="AI"> Artificial Intelligence<br>
<input type="checkbox" value="Database Systems"> Database Systems<br>
<input type="checkbox" value="Mobile App Development"> Mobile App Development<br><br>

<button onclick="showCourses()">Submit</button>

<br><br>
<a href="dashboard.html" style="color:white;">Back to Dashboard</a>

</div>

<script>
function showCourses(){
let s=[];
document.querySelectorAll("input:checked").forEach(c=>s.push(c.value));
alert("Selected: "+s.join(", "));
}
</script>

</body>
</html>
